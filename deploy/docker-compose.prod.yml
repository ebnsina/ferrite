# Production-ish compose: builds the app images and runs them against the
# infra. Bring your own managed Postgres/Redis/S3 in a real deployment; the
# infra services here mirror docker-compose.yml for a single-host setup.
#
#   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d --build
#
# All FERRITE_* config comes from the environment / .env (see .env.example).
services:
  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    env_file: .env
    ports:
      - '8091:8091'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: deploy/worker.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # Point the browser bundle at the public API URL for your deployment.
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8091}
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped
