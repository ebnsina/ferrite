# SRS ingest config for Ferrite live: RTMP in, HLS + HTTP-FLV out, HTTP API.
listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

# SRT ingest (better than RTMP on lossy networks). streamid maps to app/stream,
# e.g. srt://host:10080?streamid=#!::r=live/KEY,m=publish
srt_server {
    enabled         on;
    listen          10080;
    maxbw           1000000000;
    connect_timeout 4000;
    latency         120;
    tlpktdrop       on;
    tsbpdmode       on;
    default_app     live;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

vhost __defaultVhost__ {
    # Accept SRT publishers and bridge to the RTMP pipeline (HLS/FLV/DVR apply).
    srt {
        enabled     on;
        srt_to_rtmp on;
    }
    hls {
        enabled         on;
        hls_fragment    2;
        hls_window      12;
        hls_path        ./objs/nginx/html;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
        # Plain HLS (no per-request session query) — plays cleanly in hls.js.
        hls_ctx         off;
    }
    # HTTP-FLV for low-latency playback (SRS strength).
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
        hstrs       on;
    }
    # Record each live session, then notify Ferrite to archive it as VOD.
    dvr {
        enabled     on;
        dvr_plan    session;
        dvr_path    ./objs/nginx/html/dvr/[app]/[stream].[timestamp].flv;
    }
    http_hooks {
        enabled     on;
        on_dvr      http://host.docker.internal:8091/internal/live/dvr?secret=dev-live-hook-secret;
    }
}
