name: ferrite-stream

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ferrite
      POSTGRES_PASSWORD: ferrite
      POSTGRES_DB: ferrite
    ports:
      - "${FERRITE_PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferrite"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${FERRITE_REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ferrite
      MINIO_ROOT_PASSWORD: ferrite-secret
    ports:
      - "${FERRITE_MINIO_PORT:-9000}:9000"          # S3 API
      - "${FERRITE_MINIO_CONSOLE_PORT:-9001}:9001"  # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Live ingest (SRS): RTMP in, HLS + HTTP-FLV out, HTTP API for status.
  srs:
    image: ossrs/srs:5
    command: ["./objs/srs", "-c", "conf/ferrite.conf"]
    ports:
      - "${FERRITE_RTMP_PORT:-1935}:1935"        # RTMP ingest
      - "${FERRITE_SRT_PORT:-10080}:10080/udp"   # SRT ingest
      - "${FERRITE_SRS_HTTP_PORT:-8085}:8080"    # HLS + FLV delivery
      - "${FERRITE_SRS_API_PORT:-1985}:1985"     # control API
    volumes:
      - ./deploy/srs.conf:/usr/local/srs/conf/ferrite.conf:ro

  # One-shot: create the bucket on startup so the app has somewhere to write.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ferrite ferrite-secret &&
      mc mb --ignore-existing local/ferrite &&
      echo 'bucket ready (private; playback via the API proxy)';
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
